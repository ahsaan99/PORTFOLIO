<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ahsaan | AI & Full-Stack Developer</title>

<!-- Lenis Smooth Scroll -->
<script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

<!-- Fonts & Icons -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--bg:#030303;
--card-bg:rgba(10,10,12,0.9);
--text:#e0e0e0;
--accent:#00f0ff; 
--accent-2:#888888;
--border:rgba(0, 240, 255, 0.2);
--font-display:'Syncopate',sans-serif;
--font-code:'JetBrains Mono',monospace;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:var(--font-display);
overflow-x:hidden;
overflow-y: auto;
cursor:crosshair;
/* Critical for mobile scrolling */
touch-action: pan-y;
-webkit-overflow-scrolling: touch;
}

/* Loading Screen */
#loader {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 3rem;
  font-family: var(--font-code);
  color: var(--accent);
  transition: opacity 1s ease-out, visibility 1s;
}
.terminal-line {
  margin: 0.3rem 0;
  font-size: 1rem;
  text-shadow: 0 0 8px rgba(0,240,255,0.5);
  opacity: 0.9;
}
.cursor {
  display: inline-block;
  width: 10px;
  height: 1em;
  background: var(--accent);
  animation: blink 1s step-end infinite;
  vertical-align: bottom;
  margin-left: 5px;
}
@keyframes blink { 50% { opacity: 0; } }

/* Overlays */
.scanlines{position:fixed; inset:0; background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,0.3) 50%); background-size:100% 4px; pointer-events:none; z-index:10;}
.vignette{position:fixed; inset:0; background:radial-gradient(circle,transparent 40%,#000 120%); z-index:11; pointer-events:none;}
.noise{position:fixed; inset:0; opacity:0.04; z-index:12; pointer-events:none; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");}

/* HUD */
.hud{position:fixed; inset:2rem; z-index:20; pointer-events:none; display:flex; flex-direction:column; justify-content:space-between; font-family:var(--font-code); font-size:10px; color:rgba(0, 240, 255, 0.6);}
.hud strong{color:var(--accent);}
.hud-top,.hud-bottom{display:flex; justify-content:space-between; align-items:center;}
.hud-line{flex:1; height:1px; background:rgba(0, 240, 255, 0.2); margin:0 1rem; position:relative;}
.hud-line::after{content:''; position:absolute; right:0; top:-2px; width:5px; height:5px; background:var(--accent);}

/* 3D Scene */
.viewport{position:fixed; inset:0; perspective:1200px; overflow:hidden; pointer-events: none;}
.world{position:absolute; top:50%; left:50%; transform-style:preserve-3d; pointer-events: none;}
.item{position:absolute; left:0; top:0; transform-origin:center; display:flex; align-items:center; justify-content:center; pointer-events: none;}

/* Cards */
.card{
width:350px;
max-width:85vw;
min-height:280px;
background:var(--card-bg);
border:1px solid var(--border);
padding:2rem;
display:flex;
flex-direction:column;
justify-content:flex-start;
backdrop-filter:blur(10px);
transition:all 0.3s ease;
transform:translate(-50%,-50%);
pointer-events: auto !important; 
}
.card:hover{
border-color:var(--accent);
background:rgba(15,15,18,1);
box-shadow:0 0 40px rgba(0, 240, 255, 0.2);
}

.card h3 { color: var(--accent); margin: 0 0 1rem 0; font-size: 1.1rem; letter-spacing: 1px;}
.card p { font-family: var(--font-code); font-size: 0.8rem; line-height: 1.5; margin-bottom: 0.8rem; color: #ccc;}
.tag-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; margin-bottom: 10px; }
.tag { border: 1px solid var(--accent); padding: 3px 8px; font-size: 0.65rem; font-family: var(--font-code); color: var(--accent); background: rgba(0, 240, 255, 0.05); }

/* Links */
.card a {
  color: var(--accent) !important;
  text-decoration: none;
  font-family: var(--font-code);
  font-size: 0.9rem;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  position: relative;
  z-index: 9999;
  pointer-events: auto !important;
  cursor: pointer !important;
}
.card a:hover {
  text-decoration: underline;
  color: #fff !important;
}

.timeline-item { margin-bottom: 12px; padding-left: 12px; border-left: 2px solid var(--accent); position:relative;}
.timeline-item::before { content:''; position:absolute; left:-4px; top:4px; width:6px; height:6px; background:var(--accent); border-radius:50%; }
.timeline-item span { color: var(--accent); font-weight: bold; font-family: var(--font-code); font-size: 0.75rem; display:block; margin-bottom:2px;}
.timeline-item p { margin:0; font-size: 0.75rem; color:#aaa; }

.card-header{
display:flex;
align-items:center;
margin-bottom:1.5rem;
padding-bottom: 1rem;
border-bottom: 1px solid rgba(255,255,255,0.1);
}
.card-header i {
font-size: 2.5rem;
margin-right: 1.2rem;
color: var(--accent);
}
.card h2{font-size:1.4rem; margin:0 0 0.3rem 0; font-weight:800; color:#fff; letter-spacing: 2px;}
.card-footer{margin-top:auto; padding-top:1.5rem; font-family:var(--font-code); font-size:0.7rem; color:rgba(255,255,255,0.3); display:flex; justify-content:space-between;}

.big-text{font-size:9vw;font-weight:800;color:transparent;-webkit-text-stroke:2px rgba(0, 240, 255, 0.3);white-space:nowrap;transform:translate(-50%,-50%);letter-spacing:-0.1rem; text-shadow: 0 0 30px rgba(0,240,255,0.1);}
.star{position:absolute;width:2px;height:2px;background:var(--accent); opacity: 0.5;}
.scroll-proxy{height:10000vh; width:100%;}

@media(max-width:768px){
.card{width:80vw; padding:1.2rem; min-height: 220px;}
.card h2 { font-size: 1.2rem; }
.card-header i { font-size: 2rem; }
.big-text{font-size:14vw; -webkit-text-stroke:1px rgba(0, 240, 255, 0.3);}
#loader { padding: 1.5rem; }
.hud { inset: 1rem; font-size: 8px; }
.hud-line { margin: 0 0.5rem; }
}
</style>
</head>
<body>

<div id="loader">
  <div id="terminal-output"></div>
  <div><span id="typewriter-text"></span><span class="cursor"></span></div>
</div>

<div class="scanlines"></div>
<div class="vignette"></div>
<div class="noise"></div>

<div class="hud">
<div class="hud-top">
<span>SYS.INIT</span>
<div class="hud-line"></div>
<span>FPS: <strong id="fps">60</strong></span>
</div>
<div>SCROLL VELOCITY // <strong id="vel-readout">0.00</strong></div>
<div class="hud-bottom">
<span>COORD: <strong id="coord">000</strong></span>
<div class="hud-line"></div>
<span>VER 3.1.0</span>
</div>
</div>

<div class="viewport" id="viewport">
<div class="world" id="world"></div>
</div>
<!-- This div provides the actual height to allow the browser to scroll natively -->
<div class="scroll-proxy"></div>

<script>
const loaderLines = [
  "BOOT_SEQ_INIT // KERNEL v3.1.0",
  "ESTABLISHING SECURE CONNECTION...",
  "LOCATING_USER: UAE_GLOBAL_NODE",
  "USER_FOUND: AHSAAN",
  "LOADING_MODULES: [AI, ROBOTICS, JAVA, PYTHON, RUBY, C++]",
  "BYPASSING MAINFRAME...",
  "ACCESS GRANTED. WELCOME."
];

const terminalOutput = document.getElementById('terminal-output');
const typewriterText = document.getElementById('typewriter-text');
const loaderElement = document.getElementById('loader');

let lineIndex = 0;
let charIndex = 0;

function typeLine() {
  if (lineIndex < loaderLines.length) {
    if (charIndex < loaderLines[lineIndex].length) {
      typewriterText.textContent += loaderLines[lineIndex].charAt(charIndex);
      charIndex++;
      setTimeout(typeLine, Math.random() * 30 + 10); 
    } else {
      const div = document.createElement('div');
      div.className = 'terminal-line';
      div.textContent = loaderLines[lineIndex];
      terminalOutput.appendChild(div);
      typewriterText.textContent = '';
      charIndex = 0;
      lineIndex++;
      setTimeout(typeLine, 200); 
    }
  } else {
    setTimeout(() => {
      loaderElement.style.opacity = '0';
      setTimeout(() => { loaderElement.style.visibility = 'hidden'; }, 1000);
    }, 600);
  }
}
typeLine();

const CONFIG={itemCount:15, starCount:200, zGap:900, camSpeed:2.2};
CONFIG.loopSize=CONFIG.itemCount*CONFIG.zGap;

const CARDS=[
{ title:"AHSAAN", content:``},
{ title:"Profile", content:`<div class="card-header"><i class="fa-solid fa-user-astronaut"></i><div><h2>AHSAAN</h2><span style="font-family:var(--font-code); font-size:0.7rem; color:var(--accent);">AI & Full-Stack Dev</span></div></div><p>Based in UAE.</p><p>Passionate about building AI systems and interactive digital experiences since age 10.</p>`},
{ title:"Skills", content:`<h3>> TECH_STACK</h3><div class="tag-container"><span class="tag">Python</span><span class="tag">Java</span><span class="tag">JavaScript</span><span class="tag">C++</span><span class="tag">Ruby</span><span class="tag">HTML/CSS</span></div><div class="tag-container"><span class="tag">AI & ML</span><span class="tag">Arduino</span><span class="tag">IoT</span><span class="tag">Robotics</span></div>`},

{ title:"ROBOTICS", content:``},
{ title:"Hardware", content:`<h3><i class="fa-solid fa-microchip" style="margin-right:8px;"></i> HARDWARE</h3><div class="timeline-item"><span>Desert Bot</span><p>Automated seed planting robot built with Arduino.</p></div><div class="timeline-item" style="margin-bottom:0;"><span>V-Mouse</span><p>Gesture-controlled virtual mouse via sensors.</p></div>`},
{ title:"IoT", content:`<h3><i class="fa-solid fa-satellite-dish" style="margin-right:8px;"></i> SENSORS</h3><div class="timeline-item"><span>Water Tracker</span><p>IoT system to optimize water consumption.</p></div><div class="timeline-item"><span>Plant Health</span><p>Environmental monitoring via smart sensors.</p></div>`},

{ title:"TIMELINE", content:``},
{ title:"Early", content:`<h3>> ORIGINS</h3><div class="timeline-item"><span>2019 (Age 10)</span><p>Web fundamentals.</p></div><div class="timeline-item"><span>2021 (Age 12)</span><p>Began Python.</p></div>`},
{ title:"Recent", content:`<h3>> EVOLUTION</h3><div class="timeline-item"><span>2022-2024</span><p>Automation & AI focus in UAE.</p></div><div class="timeline-item"><span>2025 (Age 16)</span><p>Advanced AI Dev.</p></div>`},

{ title:"HACKATHON", content:``},
{ title:"Compete", content:`<h3><i class="fa-solid fa-trophy" style="margin-right:8px;"></i> COMPETE</h3><p>Participating in annual hackathons for 3 years. Focus on pitching AI/IoT solutions for real impact.</p>`},
{ title:"Goals", content:`<h3>> FUTURE</h3><p>Aiming to build a tech startup. Deep diving into AI architecture and robotics systems.</p>`},

{ title:"CONTACT", content:``},
{ title:"Info", content:`<h3>> CONNECT</h3>
  <div style="display: flex; flex-direction: column;">
    <a href="mailto:bossandco99@gmail.com"><i class="fa-solid fa-envelope"></i> ahsaan</a>
    <a href="https://github.com/ahsaan99" target="_blank"><i class="fa-brands fa-github"></i> ahsaan99</a>
    <a href="https://www.instagram.com/ahsaan_mohamed_/" target="_blank"><i class="fa-brands fa-instagram"></i> ahsaan_mohamed_</a>
    <p style="margin-top: 10px; opacity: 0.8; font-family: var(--font-code); font-size:0.8rem;"><i class="fa-solid fa-location-dot" style="margin-right:8px; color:var(--accent);"></i> UAE</p>
  </div>`},
{ title:"End", content:`<div style="text-align:center; margin-top: 1rem;"><i class="fa-solid fa-power-off" style="font-size: 3rem; color: var(--accent); opacity: 0.5;"></i><p style="margin-top: 1rem; color: var(--accent); font-size: 0.75rem; letter-spacing: 1px;">© ALL RIGHTS RESERVED<br>AHSAAN // 2026</p></div>`}
];

const state={scroll:0, velocity:0, targetSpeed:0, mouseX:0, mouseY:0};
const world=document.getElementById("world");
const viewport=document.getElementById("viewport");
const items=[];

function init(){
  const isMobile = window.innerWidth < 768;
  const spreadX = isMobile ? 0.05 : 0.09;
  const spreadY = isMobile ? 0.07 : 0.09;

  for(let i=0;i<CONFIG.itemCount;i++){
    const el=document.createElement("div");
    el.className="item";
    const isHeading=i%3===0; 
    
    if(isHeading){
      const txt=document.createElement("div");
      txt.className="big-text";
      txt.innerText=CARDS[i%CARDS.length].title;
      el.appendChild(txt);
      items.push({el,type:"text",x:0,y:0,rot:0,baseZ:-i*CONFIG.zGap});
    }else{
      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`${CARDS[i%CARDS.length].content}<div class="card-footer"><span>SYS.READY</span><span>// 2026</span></div>`;
      el.appendChild(card);
      const angle=(i/CONFIG.itemCount)*Math.PI*2;
      const x=Math.cos(angle)*(window.innerWidth * spreadX);
      const y=Math.sin(angle)*(window.innerHeight * spreadY);
      items.push({el,type:"card",x,y,rot:(Math.random()-0.5)*8,baseZ:-i*CONFIG.zGap});
    }
    world.appendChild(el);
  }

  for(let i=0;i<CONFIG.starCount;i++){
    const el=document.createElement("div");
    el.className="star";
    world.appendChild(el);
    items.push({el,type:"star",x:(Math.random()-0.5)*4000,y:(Math.random()-0.5)*4000,baseZ:-Math.random()*CONFIG.loopSize});
  }

  window.addEventListener("mousemove",(e)=>{
    state.mouseX=(e.clientX/window.innerWidth-0.5)*2;
    state.mouseY=(e.clientY/window.innerHeight-0.5)*2;
  });

  // Basic touch orientation support for mobile tilt
  window.addEventListener("touchmove", (e) => {
    if(e.touches.length > 0) {
      state.mouseX=(e.touches[0].clientX/window.innerWidth-0.5)*2;
      state.mouseY=(e.touches[0].clientY/window.innerHeight-0.5)*2;
    }
  }, {passive: true});
}
init();

// Responsive Lenis configuration
const lenis=new Lenis({
    smooth: true, 
    lerp: 0.1,
    smoothTouch: true, // Critical for mobile
    touchMultiplier: 1.5,
    infinite: false
});

lenis.on("scroll",({scroll,velocity})=>{
    state.scroll=scroll; 
    state.targetSpeed=velocity;
});

function raf(time){
  lenis.raf(time);
  const delta=time-lastTime; lastTime=time;
  
  if(delta > 0 && time%10<1) {
    document.getElementById("fps").innerText=Math.round(1000/delta);
  }
  
  state.velocity+=(state.targetSpeed-state.velocity)*0.1;
  document.getElementById("vel-readout").innerText=Math.abs(state.velocity).toFixed(2);
  document.getElementById("coord").innerText=state.scroll.toFixed(0);

  const tiltX=state.mouseY*4;
  const tiltY=state.mouseX*4;
  world.style.transform=`rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;

  const fov=1200-Math.min(Math.abs(state.velocity)*10,400);
  viewport.style.perspective=`${fov}px`;

  const cameraZ=state.scroll*CONFIG.camSpeed;
  items.forEach(item=>{
    let relZ=item.baseZ+cameraZ;
    let vizZ=((relZ%CONFIG.loopSize)+CONFIG.loopSize)%CONFIG.loopSize;
    if(vizZ>400) vizZ-=CONFIG.loopSize;
    
    let alpha=1;
    if(vizZ<-3000) alpha=0;
    else if(vizZ<-2000) alpha=(vizZ+3000)/1000;
    if(vizZ>100 && item.type!=="star") alpha=1-((vizZ-100)/400);
    if(alpha<0) alpha=0;
    item.el.style.opacity=alpha;
    
    if(alpha > 0.01){
      item.el.style.visibility = "visible";
      let trans=`translate3d(${item.x}px,${item.y}px,${vizZ}px)`;
      if(item.type==="star"){ 
          const stretch=Math.max(1,Math.min(1+Math.abs(state.velocity)*0.12,8)); 
          trans+=` scale3d(1,1,${stretch})`;
      } else {
          trans+=` rotateZ(${item.rot}deg)`;
      }
      item.el.style.transform=trans;
    } else {
      item.el.style.visibility = "hidden";
    }
  });
  requestAnimationFrame(raf);
}
let lastTime=0;
requestAnimationFrame(raf);

// Reset scroll on load
window.scrollTo(0,0);
</script>
</body>
</html>
